services:
  rails:
    container_name: rails
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: unpossible-rails:${GIT_SHA:-dev}
    environment:
      RAILS_ENV: development
      DB_HOST: postgres
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_development
      AUTH_SECRET: ${AUTH_SECRET:-8d457c009922907ffbb3fa03283a27f101232e8f47d6c1312f3535a00de318a3}
      SIDECAR_TOKEN: ${SIDECAR_TOKEN:-dev-sidecar-token}
      DEFAULT_ORG_ID: ${DEFAULT_ORG_ID:-1}
      # REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    volumes:
      - ../ledger:/ledger
      - ../.data:/.data
      - ../specs:/specs
      - ../IMPLEMENTATION_PLAN.md:/IMPLEMENTATION_PLAN.md
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unpossible

  # go_runner:
  #   build:
  #     context: ..
  #     dockerfile: infra/Dockerfile.runner
  #   image: unpossible-runner:${GIT_SHA:-dev}
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - unpossible

  # analytics:
  #   build:
  #     context: ..
  #     dockerfile: infra/Dockerfile.analytics
  #   image: unpossible-analytics:${GIT_SHA:-dev}
  #   ports:
  #     - "9100:9100"
  #   networks:
  #     - unpossible

  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unpossible"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unpossible

  # redis:
  #   image: redis:7-alpine
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - unpossible

networks:
  unpossible:
    driver: bridge
