services:
  rails:
    container_name: rails
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: unpossible-rails:${GIT_SHA:-dev}
    environment:
      RAILS_ENV: development
      DB_HOST: postgres
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_development
      AUTH_SECRET: ${AUTH_SECRET:-8d457c009922907ffbb3fa03283a27f101232e8f47d6c1312f3535a00de318a3}
      SIDECAR_TOKEN: ${SIDECAR_TOKEN:-dev-sidecar-token}
      DEFAULT_ORG_ID: ${DEFAULT_ORG_ID:-00000000-0000-0000-0000-000000000001}
      DISABLE_AUTH: ${DISABLE_AUTH:-true}
      # REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    volumes:
      - ../web/app:/app/app
      - ../web/config:/app/config
      - ../web/lib:/app/lib
      - ../.data:/.data
      - ../specs:/specs
      - ../IMPLEMENTATION_PLAN.md:/IMPLEMENTATION_PLAN.md
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unpossible

  analytics:
    build:
      context: ..
      dockerfile: infra/Dockerfile.go
      target: analytics
    image: unpossible-analytics:${GIT_SHA:-dev}
    environment:
      DATABASE_URL: postgres://unpossible:unpossible@postgres:5432/unpossible_development?sslmode=disable
    ports:
      - "9100:9100"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unpossible

  go_runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.go
      target: runner
    image: unpossible-runner:${GIT_SHA:-dev}
    env_file:
      - ../.env
    environment:
      RAILS_URL: http://rails:3000
      RUNNER_USERNAME: ${RUNNER_USERNAME:-runner}
      RUNNER_PASSWORD: ${RUNNER_PASSWORD:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace
    working_dir: /workspace
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unpossible

  agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    image: unpossible-agent:${GIT_SHA:-dev}
    env_file:
      - ../.env
    environment:
      AGENT: ${AGENT:-claude}
      MODEL: ${MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GH_TOKEN: ${GH_TOKEN:-}
      RUNNER_URL: http://go_runner:8080
      RUNNER_USERNAME: ${RUNNER_USERNAME:-runner}
      RUNNER_PASSWORD: ${RUNNER_PASSWORD:-}
    volumes:
      - ..:/workspace
      - ${KIRO_CLI_PATH:-/usr/local/bin/kiro-cli}:/usr/local/bin/kiro-cli:ro
    working_dir: /workspace
    depends_on:
      - go_runner
    networks:
      - unpossible

  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unpossible"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unpossible

  # redis:
  #   image: redis:7-alpine
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - unpossible

networks:
  unpossible:
    driver: bridge
