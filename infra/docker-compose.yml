# docker-compose.yml — used for local development and running tests in the loop.
#
# Build image:  docker compose -f infra/docker-compose.yml build
# Run app:      docker compose -f infra/docker-compose.yml up app
# Run tests:    docker compose -f infra/docker-compose.yml run --rm test

services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "[port]:[ port]"   # fill in from specs/prd.md "Port"
    volumes:
      - ../app:/app        # hot-reload during development (remove in prod)

  test:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    command: [your test command]   # fill in from specs/prd.md "Test command"
    volumes:
      - ../app:/app
    environment:
      - APP_ENV=test
