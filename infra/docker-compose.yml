services:
  rails:
    container_name: rails
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: unpossible-rails:${GIT_SHA:-dev}
    environment:
      RAILS_ENV: development
      DB_HOST: postgres
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_development
      AUTH_SECRET: ${AUTH_SECRET:-8d457c009922907ffbb3fa03283a27f101232e8f47d6c1312f3535a00de318a3}
      SIDECAR_TOKEN: ${SIDECAR_TOKEN:-dev-sidecar-token}
      DEFAULT_ORG_ID: ${DEFAULT_ORG_ID:-00000000-0000-0000-0000-000000000001}
      DISABLE_AUTH: ${DISABLE_AUTH:-true}
      # REDIS_URL: redis://redis:6379/0
    ports:
      - "3000:3000"
    volumes:
      - ../web/app:/app/app
      - ../web/config:/app/config
      - ../web/lib:/app/lib
      - ../.data:/.data
      - ../specs:/specs
      - ../IMPLEMENTATION_PLAN.md:/IMPLEMENTATION_PLAN.md
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unpossible

  # Phase 0: Go sidecars not yet built — go/ directory does not exist.
  # Uncomment when go/cmd/runner and go/cmd/analytics are implemented (tasks 8.2, 8.6).
  # go_runner:f
  #   build:
  #     context: ..
  #     dockerfile: infra/Dockerfile.go
  #     target: runner
  #   image: unpossible-runner:${GIT_SHA:-dev}
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - unpossible

  go_runner:
    build:
      context: ..
      dockerfile: infra/Dockerfile.go
      target: runner
    image: unpossible-runner:${GIT_SHA:-dev}
    env_file:
      - ../.env
    environment:
      RAILS_URL: http://rails:3000
      ANALYTICS_URL: http://analytics:9100
      RUNNER_USERNAME: ${RUNNER_USERNAME:-runner}
      RUNNER_PASSWORD: ${RUNNER_PASSWORD:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace
    working_dir: /workspace
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unpossible

  agent:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent
    image: unpossible-agent:${GIT_SHA:-dev}
    env_file:
      - ../.env
    environment:
      AGENT: ${AGENT:-claude}
      MODEL: ${MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GH_TOKEN: ${GH_TOKEN:-}
      RUNNER_URL: http://go_runner:8080
      RUNNER_USERNAME: ${RUNNER_USERNAME:-runner}
      RUNNER_PASSWORD: ${RUNNER_PASSWORD:-}
    volumes:
      - ..:/workspace
      - ${HOME}/.local/bin/kiro-cli:/usr/local/bin/kiro-cli
      - ${HOME}/.local/bin/kiro-cli-chat:/usr/local/bin/kiro-cli-chat
      - ${HOME}/.local/bin/kiro-cli-term:/usr/local/bin/kiro-cli-term
      - ${HOME}/.local/share/kiro-cli:/home/agent/.local/share/kiro-cli
    working_dir: /workspace
    depends_on:
      - go_runner
    networks:
      - unpossible

  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unpossible"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unpossible

networks:
  unpossible:
    driver: bridge
