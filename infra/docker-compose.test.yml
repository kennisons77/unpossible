services:
  test:
    build:
      context: ..
      dockerfile: infra/Dockerfile.test
    environment:
      RAILS_ENV: test
      DB_HOST: postgres
      POSTGRES_USER: unpossible2
      POSTGRES_PASSWORD: unpossible2
      POSTGRES_DB: unpossible2_test
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bundle", "exec", "rspec"]
    networks:
      - unpossible2

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: unpossible2
      POSTGRES_PASSWORD: unpossible2
      POSTGRES_DB: unpossible2_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unpossible2"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unpossible2

networks:
  unpossible2:
    driver: bridge
