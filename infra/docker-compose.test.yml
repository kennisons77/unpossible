services:
  test:
    container_name: unpossible-test
    build:
      context: ..
      dockerfile: infra/Dockerfile.test
    environment:
      RAILS_ENV: test
      DB_HOST: postgres
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_test
      AUTH_SECRET: test-auth-secret
      SIDECAR_TOKEN: test-sidecar-token
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bundle", "exec", "rspec"]
    networks:
      - unpossible

  postgres:
    container_name: unpossible-test-postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: unpossible
      POSTGRES_PASSWORD: unpossible
      POSTGRES_DB: unpossible_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unpossible"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - unpossible

networks:
  unpossible:
    driver: bridge
